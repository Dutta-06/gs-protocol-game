<!doctype html>
<html lang="en" style="height: 100%">
  <head>
    <script src="/coi-serviceworker.js"></script>
    <script>
      if (navigator.serviceWorker.controller !== null) {
        setInterval(() => {
          navigator.serviceWorker.controller.postMessage({ type: "heartbeat" });
        }, 5000);
      }
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mkxp-z-nostalgist</title>
    <link ref="stylesheet" href="/node_modules/@fontsource/roboto/index.css" />
    <link rel="stylesheet" href="/node_modules/spin.js/spin.css" />
    <style>
      .Gamepad-controller.is-active {
        box-shadow: 0 0 50px currentColor;
      }

      #loading-overlay {
        position: fixed;
        left: 0; top: 0;
        width: 100%; height: 100%;
        background: #000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        font-family: Roboto, sans-serif;
        color: #fff;
        gap: 24px;
        transition: opacity 0.5s ease;
      }

      #loading-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #loading-status {
        font-size: 18px;
        opacity: 0.8;
        text-align: center;
        max-width: 400px;
        line-height: 1.6;
      }

      #reload-prompt {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        text-align: center;
      }

      #reload-prompt p {
        font-size: 16px;
        opacity: 0.7;
        max-width: 360px;
        line-height: 1.6;
      }

      #reload-btn {
        background: #fff;
        color: #000;
        border: none;
        padding: 12px 32px;
        font-size: 16px;
        font-family: Roboto, sans-serif;
        font-weight: 600;
        border-radius: 4px;
        cursor: pointer;
        letter-spacing: 0.5px;
      }

      #reload-btn:hover {
        background: #ddd;
      }

      .dot-loader {
        display: flex;
        gap: 8px;
      }

      .dot-loader span {
        width: 10px;
        height: 10px;
        background: #fff;
        border-radius: 50%;
        animation: bounce 1.2s infinite ease-in-out;
        opacity: 0.6;
      }

      .dot-loader span:nth-child(1) { animation-delay: 0s; }
      .dot-loader span:nth-child(2) { animation-delay: 0.2s; }
      .dot-loader span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes bounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body
    style="
      height: 100%;
      overflow: hidden;
      font-family: Roboto;
      color: #fff;
      background-color: #000;
    "
  >
    <div id="loading-overlay">
      <div class="dot-loader" id="dot-loader">
        <span></span><span></span><span></span>
      </div>
      <div id="loading-status">Starting up...</div>
      <div id="reload-prompt">
        <p>The game didn't load this time. This happens occasionally — a quick reload usually fixes it.</p>
        <button id="reload-btn" onclick="location.reload()">Reload</button>
      </div>
    </div>

    <div
      id="spinner-target"
      style="
        position: fixed;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      "
    >
      <div
        id="progressbar-target"
        style="display: none; width: 70px; height: 70px"
      ></div>
      <p id="user-activation-prompt" style="display: none; font-size: 100px">
        ▶
      </p>
    </div>
    <canvas
      id="nostalgist-canvas"
      style="position: fixed; left: 0; top: 0; width: 100%; height: 100%"
    ></canvas>
    <div id="gamepad-target"></div>
    <script type="module" src="/src/main.ts"></script>

    <script>
      (function () {
        const overlay = document.getElementById('loading-overlay');
        const status = document.getElementById('loading-status');
        const dotLoader = document.getElementById('dot-loader');
        const reloadPrompt = document.getElementById('reload-prompt');

        let gameStarted = false;
        let retroarchStarted = false;
        let opfsMounted = false;
        let stuckTimer = null;

        function showReload() {
          if (gameStarted) return;
          dotLoader.style.display = 'none';
          status.textContent = "Didn't load this time.";
          reloadPrompt.style.display = 'flex';
        }

        const originalLog = console.log;
        console.log = function (...args) {
          originalLog.apply(console, args);
          const msg = args.join(' ');

          // OPFS mount = start 10 second countdown
          if (!opfsMounted && msg.includes('Mount OPFS')) {
            opfsMounted = true;
            status.textContent = 'Initializing...';
            stuckTimer = setTimeout(showReload, 10000);
          }

          // Red logs (Build) = RetroArch is starting, cancel stuck timer
          if (!retroarchStarted && msg.includes('Build')) {
            retroarchStarted = true;
            clearTimeout(stuckTimer);
            status.textContent = 'Loading game...';
          }
        };

        // Watch canvas for game starting
        const canvas = document.getElementById('nostalgist-canvas');
        const observer = new MutationObserver(() => {
          if (canvas.width > 0 && canvas.height > 0 && !gameStarted) {
            setTimeout(() => {
              gameStarted = true;
              overlay.classList.add('hidden');
              setTimeout(() => { overlay.style.display = 'none'; }, 600);
            }, 1500);
          }
        });
        observer.observe(canvas, { attributes: true, attributeFilter: ['width', 'height'] });
      })();
    </script>
  </body>
</html>
